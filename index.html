<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpeningForge — Chess Opening Trainer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-1:#0a0b10;--bg-2:#12141f;--bg-3:#181b2c;
  --glass:rgba(255,255,255,0.045);--glass-strong:rgba(255,255,255,0.07);
  --glass-border:rgba(255,255,255,0.09);--glass-border-hi:rgba(201,168,76,0.35);
  --panel2:rgba(255,255,255,0.055);--border:rgba(255,255,255,0.09);
  --gold:#d4b45f;--gold-bright:#f0cd7a;--gold-dim:#7a5f2a;
  --green:#5ec98a;--red:#e2635f;
  --text:#ecebe6;--muted:#8e91a8;
  --sq-light:#f0d9b5;--sq-dark:#b58863;
  --shadow-lift:0 10px 30px rgba(0,0,0,0.45),0 2px 8px rgba(0,0,0,0.3);
}
html,body{height:100%}
body{
  background:
    radial-gradient(circle at 15% 8%, rgba(212,180,95,0.10), transparent 45%),
    radial-gradient(circle at 85% 92%, rgba(94,201,138,0.06), transparent 50%),
    linear-gradient(160deg, var(--bg-1) 0%, var(--bg-2) 55%, var(--bg-3) 100%);
  background-attachment:fixed;
  color:var(--text);font-family:'Inter',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;
}
header{
  display:flex;align-items:center;justify-content:space-between;padding:14px 28px;
  background:rgba(18,20,31,0.65);backdrop-filter:blur(18px) saturate(140%);-webkit-backdrop-filter:blur(18px) saturate(140%);
  border-bottom:1px solid var(--glass-border);flex-wrap:wrap;gap:10px;z-index:20;flex-shrink:0;
  box-shadow:0 4px 24px rgba(0,0,0,0.25);
}
.logo{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:800;color:var(--gold-bright);letter-spacing:0.3px;
  text-shadow:0 0 18px rgba(212,180,95,0.35)}
.logo span{color:var(--text);font-weight:600}
.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

select{
  background:var(--glass);border:1px solid var(--glass-border);color:var(--text);padding:8px 14px;border-radius:10px;
  font-family:'Inter',sans-serif;font-size:0.83rem;cursor:pointer;outline:none;transition:border-color 0.2s,background 0.2s,box-shadow 0.2s;
  backdrop-filter:blur(8px);appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0L5 6L10 0' fill='%238e91a8'/></svg>");background-repeat:no-repeat;background-position:right 12px center;padding-right:30px;
}
select:hover{border-color:var(--glass-border-hi);background-color:var(--glass-strong)}
select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,180,95,0.15)}
select option{background:#1a1d2c;color:var(--text)}

.btn{
  padding:9px 18px;border-radius:10px;border:1px solid transparent;font-family:'Inter',sans-serif;font-size:0.83rem;font-weight:600;
  cursor:pointer;transition:all 0.18s cubic-bezier(.2,.8,.2,1);position:relative;letter-spacing:0.2px;
}
.btn-gold{background:linear-gradient(155deg,var(--gold-bright),var(--gold) 60%,#b6903f);color:#171208;box-shadow:0 4px 16px rgba(212,180,95,0.25),inset 0 1px 0 rgba(255,255,255,0.4)}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(212,180,95,0.4),inset 0 1px 0 rgba(255,255,255,0.5)}
.btn-gold:active{transform:translateY(0)}
.btn-outline{background:var(--glass);border:1px solid var(--glass-border);color:var(--text);backdrop-filter:blur(8px)}
.btn-outline:hover{border-color:var(--glass-border-hi);color:var(--gold-bright);background:var(--glass-strong);transform:translateY(-1px)}
.btn:disabled{opacity:0.3;cursor:default;transform:none!important;box-shadow:none!important}

main{display:grid;grid-template-columns:auto 1fr;flex:1;overflow:hidden;min-height:0}

/* BOARD SECTION — fixed, never moves */
.board-section{
  display:flex;flex-direction:column;align-items:center;padding:26px 24px;gap:16px;
  border-right:1px solid var(--glass-border);min-width:420px;height:100%;overflow-y:auto;overflow-x:hidden;flex-shrink:0;
  justify-content:flex-start;
}
.board-section::-webkit-scrollbar{width:4px}
.board-section::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:2px}
.mode-badge{
  font-size:0.68rem;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;padding:4px 12px;border-radius:100px;
  background:var(--glass);border:1px solid var(--glass-border);color:var(--muted);align-self:flex-start;backdrop-filter:blur(8px);
}
.mode-badge.learn{border-color:var(--glass-border-hi);color:var(--gold-bright);box-shadow:0 0 14px rgba(212,180,95,0.15)}
.mode-badge.test{border-color:rgba(94,201,138,0.4);color:var(--green);box-shadow:0 0 14px rgba(94,201,138,0.15)}

/* BOARD */
.board-wrap{position:relative;user-select:none;border-radius:8px;
  box-shadow:0 20px 60px rgba(0,0,0,0.55),0 0 0 1px rgba(255,255,255,0.06),0 0 50px rgba(212,180,95,0.06);
}
.board-container{display:flex;align-items:flex-start}
.rank-labels{display:flex;flex-direction:column;width:20px;margin-right:4px}
.file-labels{display:flex;height:20px;margin-top:4px;padding-left:20px}
.coord-label{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--muted);font-family:'Inter',sans-serif}
.rank-labels .coord-label{height:72px}
.file-labels .coord-label{width:72px}

#chessboard{display:grid;grid-template-columns:repeat(8,72px);grid-template-rows:repeat(8,72px);border:3px solid #4a3416;border-radius:6px;overflow:hidden}
.sq{width:72px;height:72px;position:relative;display:flex;align-items:center;justify-content:center;transition:filter 0.1s}
.sq.light{background:var(--sq-light)}
.sq.dark{background:var(--sq-dark)}
.sq.hl-from{background:rgba(212,180,95,0.65)!important}
.sq.hl-to{background:rgba(212,180,95,0.5)!important}
.sq.selected{outline:3px solid rgba(94,170,255,0.75);outline-offset:-3px;z-index:2}
.sq.drag-over{outline:3px solid rgba(94,201,138,0.85);outline-offset:-3px;z-index:2}
.sq.correct{animation:flash-green 0.55s ease;background:rgba(94,201,138,0.85)!important}
.sq.wrong{animation:flash-red 0.55s ease;background:rgba(226,99,95,0.85)!important}
.sq.legal-dot::after{content:'';position:absolute;width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,0.24);pointer-events:none;z-index:1}
.sq.legal-capture::after{content:'';position:absolute;inset:5px;border-radius:50%;border:4px solid rgba(0,0,0,0.24);pointer-events:none;z-index:1}
.sq[data-clickable="1"]{cursor:pointer}
.sq[data-clickable="1"]:hover{filter:brightness(1.12)}
@keyframes flash-green{0%,100%{background:rgba(94,201,138,0.85)!important}50%{background:rgba(94,201,138,1)!important}}
@keyframes flash-red{0%,100%{background:rgba(226,99,95,0.85)!important}50%{background:rgba(226,99,95,1)!important}}

.piece-img{width:66px;height:66px;pointer-events:none;position:relative;z-index:2;filter:drop-shadow(0 2px 3px rgba(0,0,0,0.4));transition:opacity 0.1s}
.piece-img.draggable{pointer-events:auto;cursor:grab}
.piece-img.dragging-source{opacity:0.25}
.drag-ghost{position:fixed;width:74px;height:74px;pointer-events:none;z-index:999;filter:drop-shadow(0 8px 14px rgba(0,0,0,0.5));transform:translate(-50%,-50%) scale(1.08);will-change:transform}

/* BOARD CONTROLS */
.board-controls{display:flex;align-items:center;gap:10px;width:100%;justify-content:center;flex-shrink:0}
.move-nav{display:flex;gap:5px}
.nav-btn{
  width:36px;height:36px;border-radius:9px;border:1px solid var(--glass-border);background:var(--glass);color:var(--text);
  font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.18s;backdrop-filter:blur(8px);
}
.nav-btn:hover{border-color:var(--glass-border-hi);color:var(--gold-bright);background:var(--glass-strong);transform:translateY(-1px)}
.nav-btn:disabled{opacity:0.25;cursor:default;transform:none!important}
.nav-btn.flip-btn{color:var(--gold-bright);border-color:rgba(212,180,95,0.25)}
.progress-bar-wrap{flex:1;height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold-bright));border-radius:3px;transition:width 0.3s ease;box-shadow:0 0 8px rgba(212,180,95,0.5)}

.auto-label{font-size:0.73rem;color:var(--muted);letter-spacing:0.3px;text-align:center;min-height:18px;transition:opacity 0.2s;flex-shrink:0}

/* TEST SCORE */
.test-score{display:none;gap:18px;font-size:0.83rem;flex-shrink:0}
.score-correct{color:var(--green);font-weight:700}
.score-wrong{color:var(--red);font-weight:700}

/* FEEDBACK */
.feedback-bar{
  position:absolute;bottom:-40px;left:50%;transform:translateX(-50%);padding:6px 20px;border-radius:20px;font-size:0.8rem;font-weight:600;
  opacity:0;pointer-events:none;transition:opacity 0.25s;white-space:nowrap;z-index:10;backdrop-filter:blur(6px);
}
.feedback-bar.show{opacity:1}
.feedback-bar.good{background:rgba(94,201,138,0.9);color:#0a1a10;box-shadow:0 4px 16px rgba(94,201,138,0.35)}
.feedback-bar.bad{background:rgba(226,99,95,0.9);color:#1a0a0a;box-shadow:0 4px 16px rgba(226,99,95,0.35)}

/* SIDE PANEL — internal scroll only, never affects board */
.side-panel{display:flex;flex-direction:column;overflow:hidden;height:100%;min-height:0}
.opening-intro{padding:22px 26px 18px;border-bottom:1px solid var(--glass-border);background:rgba(255,255,255,0.02);flex-shrink:0;backdrop-filter:blur(10px)}
.opening-title{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;margin-bottom:4px}
.opening-subtitle{font-size:0.72rem;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;color:var(--gold-dim);margin-bottom:10px}
.opening-intro p{font-size:0.85rem;line-height:1.65;color:#b8b6b0}

/* MOVE FEED */
.move-feed{flex:1;overflow-y:auto;padding:12px 0;scroll-behavior:smooth;min-height:0}
.move-feed::-webkit-scrollbar{width:4px}
.move-feed::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:2px}
.move-entry{display:flex;gap:12px;padding:13px 24px;border-left:3px solid transparent;transition:all 0.25s;opacity:0.35}
.move-entry.active{opacity:1;background:linear-gradient(90deg,rgba(212,180,95,0.08),transparent);border-left-color:var(--gold);box-shadow:inset 0 0 20px rgba(212,180,95,0.04)}
.move-entry.visited{opacity:0.62}
.move-entry.your-move .move-san::before{content:'YOU';font-size:0.58rem;font-weight:700;letter-spacing:1px;color:var(--gold-bright);background:rgba(212,180,95,0.14);border:1px solid rgba(212,180,95,0.35);padding:1px 5px;border-radius:3px;margin-right:6px;vertical-align:middle}
.move-number{font-size:0.7rem;font-weight:600;color:var(--muted);min-width:26px;padding-top:2px;letter-spacing:0.5px}
.move-info{flex:1}
.move-san{font-size:0.92rem;font-weight:600;font-family:'Playfair Display',serif;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.who-badge{font-family:'Inter',sans-serif;font-size:0.62rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:1px 6px;border-radius:3px}
.who-badge.w{background:rgba(255,255,255,0.1);color:#d0cfc9}
.who-badge.b{background:rgba(0,0,0,0.3);color:#9a9894}
.move-explanation{font-size:0.8rem;line-height:1.6;color:#9a9894}

/* TEST PANEL */
.test-panel{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:36px 28px;gap:14px;text-align:center;overflow-y:auto;min-height:0}
.test-panel.active{display:flex}
.test-title{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700}
.test-instruction{font-size:0.85rem;line-height:1.65;color:#9a9894;max-width:320px}
.test-move-status{font-size:0.95rem;font-weight:600;min-height:26px}
.test-move-status.correct{color:var(--green)}
.test-move-status.wrong{color:var(--red)}
.test-result{
  display:none;flex-direction:column;align-items:center;gap:10px;padding:22px;border-radius:14px;width:100%;
  background:var(--glass);border:1px solid var(--glass-border);backdrop-filter:blur(14px);box-shadow:var(--shadow-lift);
}
.test-result.show{display:flex}
.result-score{font-family:'Playfair Display',serif;font-size:2.3rem;font-weight:700;color:var(--gold-bright);text-shadow:0 0 20px rgba(212,180,95,0.3)}
.result-label{font-size:0.82rem;color:var(--muted)}
.result-msg{font-size:0.88rem;text-align:center;line-height:1.5}

/* WELCOME */
#welcome{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:10px;text-align:center;padding:40px}
#welcome h1{font-family:'Playfair Display',serif;font-size:2.6rem;font-weight:800;color:var(--gold-bright);margin-bottom:6px;text-shadow:0 0 30px rgba(212,180,95,0.25)}
#welcome p{font-size:0.96rem;color:var(--muted);max-width:400px;line-height:1.6}
#welcome .hint{font-size:0.85rem;color:var(--muted);margin-top:16px}

@media (max-width:860px){
  main{grid-template-columns:1fr;grid-template-rows:auto 1fr;overflow-y:auto}
  .board-section{border-right:none;border-bottom:1px solid var(--glass-border);height:auto;min-width:0}
  .side-panel{height:auto}
}
</style>
</head>
<body>
<header>
  <div class="logo">Opening<span>Forge</span></div>
  <div class="controls">
    <select id="openingSelect">
      <option value="">— Choose Opening —</option>
      <option value="london">London System</option>
      <option value="sicilian_dragon">Sicilian Dragon</option>
      <option value="najdorf_english">Sicilian Najdorf</option>
    </select>
    <select id="variationSelect" disabled><option value="">— Variation —</option></select>
    <button class="btn btn-outline" id="learnBtn" disabled>Learn</button>
    <button class="btn btn-gold"    id="testBtn"  disabled>Test me</button>
    <span style="width:1px;height:22px;background:var(--glass-border);margin:0 2px"></span>
    <button class="btn btn-outline" id="playBotBtn">Play vs Bot</button>
  </div>
</header>
<main id="mainArea">
  <div id="welcome">
    <h1>OpeningForge</h1>
    <p>Master your chess openings — move by move, with explanations for every idea.</p>
    <p class="hint">↑ Select an opening above to begin</p>
  </div>
</main>

<template id="appTpl">
  <section class="board-section">
    <div class="mode-badge learn" id="modeBadge">LEARN MODE</div>
    <div class="board-wrap">
      <div class="board-container">
        <div class="rank-labels" id="rankLabels"></div>
        <div>
          <div id="chessboard"></div>
          <div class="file-labels" id="fileLabels"></div>
        </div>
      </div>
      <div class="feedback-bar" id="feedbackBar"></div>
    </div>
    <div class="auto-label" id="autoLabel"></div>
    <div class="board-controls">
      <div class="move-nav">
        <button class="nav-btn" id="btnFirst" title="First move">⏮</button>
        <button class="nav-btn" id="btnPrev" title="Previous move">◀</button>
        <button class="nav-btn" id="btnNext" title="Next move">▶</button>
        <button class="nav-btn" id="btnLast" title="Last move">⏭</button>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
      <button class="nav-btn flip-btn" id="btnFlip" title="Flip board">⇅</button>
      <button class="nav-btn" id="btnMute" title="Mute sound">🔊</button>
    </div>
    <div class="test-score" id="testScore">
      <span>✔ <span class="score-correct" id="scoreCorrect">0</span> correct</span>
      <span>✘ <span class="score-wrong"   id="scoreWrong">0</span> wrong</span>
    </div>
  </section>
  <aside class="side-panel" id="sidePanel">
    <div id="learnContent" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
      <div class="opening-intro">
        <div class="opening-subtitle" id="openingSubtitle">OPENING</div>
        <div class="opening-title"   id="openingTitle">—</div>
        <p id="openingIntroText"></p>
      </div>
      <div class="move-feed" id="moveFeed"></div>
    </div>
    <div class="test-panel" id="testContent">
      <div class="test-title">Opening Test</div>
      <p class="test-instruction" id="testInstruction">Play the opening from the beginning. Only move your pieces — the opponent moves automatically.</p>
      <div class="test-move-status" id="testMoveStatus"></div>
      <div class="test-result" id="testResult">
        <div class="result-score" id="resultScore">—</div>
        <div class="result-label">correct moves</div>
        <div class="result-msg"   id="resultMsg"></div>
        <button class="btn btn-gold" id="retryBtn">Try again</button>
      </div>
    </div>
  </aside>
</template>

<template id="botTpl">
  <section class="board-section">
    <div class="mode-badge test" id="botModeBadge">PLAY VS BOT</div>
    <div class="board-wrap">
      <div class="board-container">
        <div class="rank-labels" id="rankLabels"></div>
        <div>
          <div id="chessboard"></div>
          <div class="file-labels" id="fileLabels"></div>
        </div>
      </div>
      <div class="feedback-bar" id="feedbackBar"></div>
    </div>
    <div class="auto-label" id="autoLabel"></div>
    <div class="board-controls">
      <button class="nav-btn flip-btn" id="btnFlip" title="Flip board">⇅</button>
      <div class="progress-bar-wrap" style="visibility:hidden"><div class="progress-bar" style="width:0%"></div></div>
      <button class="nav-btn" id="btnMute" title="Mute sound">🔊</button>
    </div>
  </section>
  <aside class="side-panel" id="sidePanel">
    <div class="opening-intro">
      <div class="opening-subtitle">PLAY VS BOT</div>
      <div class="opening-title" id="botTitle">Choose a level</div>
      <p id="botStatusText">Pick a difficulty and a color, then start the game.</p>
    </div>
    <div style="padding:18px 26px;display:flex;flex-direction:column;gap:14px;border-bottom:1px solid var(--glass-border)">
      <div>
        <label style="font-size:0.72rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:6px">Difficulty</label>
        <select id="botLevelSelect" style="width:100%"></select>
      </div>
      <div>
        <label style="font-size:0.72rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:6px">Play as</label>
        <select id="botColorSelect" style="width:100%">
          <option value="white">White</option>
          <option value="black">Black</option>
        </select>
      </div>
      <button class="btn btn-gold" id="botStartBtn" style="width:100%">Start Game</button>
      <button class="btn btn-outline" id="botResignBtn" style="width:100%;display:none">Resign</button>
    </div>
    <div class="move-feed" id="botMoveFeed"></div>
  </aside>
</template>

 rooks activate."},{san:"Qd2",who:"white",explanation:"Connecting rooks and preparing O-O-O — White will castle queenside and launch a direct king-hunt."},{san:"Nc6",who:"black",explanation:"Develops the knight, increasing pressure on d4 and preparing queenside counter-attack."},{san:"O-O-O",who:"white",explanation:"White castles QUEENSIDE — the race begins! g4-h4-h5 will smash open lines against the Black king."},{san:"d5",who:"black",explanation:"The classic Dragon counter-thrust! Blasts open the center immediately to generate queenside play before White's attack crashes through."},{san:"exd5",who:"white",explanation:"White captures, opening the e-file."},{san:"Nxd5",who:"black",explanation:"Black recaptures with the knight, centralizing it powerfully."},{san:"Nxc6",who:"white",explanation:"White trades off the knight, disrupting Black's queenside pawn structure."},{san:"bxc6",who:"black",explanation:"Black recaptures, opening the b-file — exactly what Black wanted! The b-file and Dragon bishop together create massive queenside pressure."},{san:"Bd4",who:"white",explanation:"White posts the bishop on d4, trying to neutralize the Dragon bishop. The position is razor-sharp — both sides must play precisely."}]},maroczy:{name:"Maróczy Bind",intro:"The Maróczy Bind is White's attempt to suffocate the Dragon rather than attack it directly. With pawns on e4 and c4, White clamps down the center and starves Black of space. It's a long strategic battle — Black must find piece activity despite the cramped position. The Dragon bishop on g7 becomes Black's long-term trump card.",moves:[{san:"e4",who:"white",explanation:"King's pawn opening — the fight for the center starts immediately."},{san:"c5",who:"black",explanation:"The Sicilian — Black fights back asymmetrically."},{san:"Nf3",who:"white",explanation:"Developing towards the center, preparing d4."},{san:"Nc6",who:"black",explanation:"Black develops the queenside knight, supporting d5 and e5."},{san:"d4",who:"white",explanation:"White opens the center. Black must take."},{san:"cxd4",who:"black",explanation:"Black captures — the c-file is now half-open."},{san:"Nxd4",who:"white",explanation:"White recaptures and controls the center."},{san:"g6",who:"black",explanation:"The Dragon structure! Black will fianchetto the bishop."},{san:"c4",who:"white",explanation:"THE MARÓCZY BIND! White erects a c4-e4 pawn wall that severely restricts Black's space — especially the d5 square. Black cannot play d5 now."},{san:"Bg7",who:"black",explanation:"The Dragon bishop arrives. In the Bind, this bishop is Black's most important piece."},{san:"Be3",who:"white",explanation:"Solid development — White prepares to maintain the bind."},{san:"Nf6",who:"black",explanation:"Kingside knight out — challenges e4 and prepares castling."},{san:"Nc3",who:"white",explanation:"White reinforces e4 and d4. The bind is now fully established."},{san:"O-O",who:"black",explanation:"Black castles to safety."},{san:"Be2",who:"white",explanation:"A quiet, solid development. White doesn't need to attack in the Bind — just maintain the space advantage."},{san:"d6",who:"black",explanation:"Black plays d6 now that d5 is blocked. Prepares Be6, Nd7, and potential queenside expansion."},{san:"O-O",who:"white",explanation:"White castles kingside too. The Bind is a slow strategic game."},{san:"Nxd4",who:"black",explanation:"Black trades off White's centralized knight to relieve some pressure."},{san:"Bxd4",who:"white",explanation:"White recaptures, keeping the bishop active on d4 where it controls important squares."},{san:"Be6",who:"black",explanation:"Black develops the bishop to e6, eyeing the c4 pawn and preparing Qa5 ideas."},{san:"Qd2",who:"white",explanation:"White connects rooks and prepares Rfd1 or queenside expansion."},{san:"Qa5",who:"black",explanation:"Black's queen hits c3 and a2 simultaneously — starting the queenside counterplay that is Black's main hope in the Maróczy Bind."}]}}},

storm."},{san:"Be6",who:"black",explanation:"The bishop develops actively, targeting b3 and supporting d5 ideas."},{san:"f3",who:"white",explanation:"The English Attack signature move! Reinforces e4 and clears the way for the g4-h4-h5 pawn storm. A direct declaration of war."},{san:"Be7",who:"black",explanation:"Black prepares to castle into safety before White's storm arrives."},{san:"Qd2",who:"white",explanation:"Connects rooks and prepares O-O-O — the pawn storm will begin immediately after."},{san:"O-O",who:"black",explanation:"Black castles! Now the race is on. Black needs queenside play before White's g4-g5 attack breaks through."},{san:"O-O-O",who:"white",explanation:"White castles queenside — the kings go to opposite sides. The English Attack's defining moment: a direct race where the first to attack the enemy king wins."},{san:"Nbd7",who:"black",explanation:"Developing the knight towards c5, where it will support the b5 break and pressure White's position."},{san:"g4",who:"white",explanation:"THE PAWN STORM BEGINS! g4-g5 is coming to kick the Nf6 and open lines against the Black king."},{san:"b5",who:"black",explanation:"Black's counter-strike! The b-pawn charges forward — b4 will hit the Nc3, and Nc5 is coming with huge pressure. The race is on!"}]}}}

// ── STATE ──
let S = {
  opening:null, variation:null, moves:[], mode:'learn',
  chess:null, currentMove:-1, flipped:false,
  testChess:null, testMove:0, selectedSq:null, legalMoves:[],
  testCorrect:0, testWrong:0, autoTimer:null, busy:false, muted:false
};

// ── SOUND ENGINE (synthesized, no external files) ──
let _actx = null;
function actx() { if (!_actx) _actx = new (window.AudioContext || window.webkitAudioContext)(); return _actx; }
function playTone(freq, dur, type, vol, delay) {
  if (S.muted) return;
  try {
    const ctx = actx();
    const t0 = ctx.currentTime + (delay || 0);
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, t0);
    gain.gain.setValueAtTime(0, t0);
    gain.gain.linearRampToValueAtTime(vol, t0 + 0.008);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t0); osc.stop(t0 + dur + 0.02);
  } catch(e) {}
}
function sndMove()     { playTone(720, 0.09, 'triangle', 0.22); playTone(480, 0.07, 'sine', 0.12, 0.02); }
function sndCapture()  { playTone(280, 0.14, 'square', 0.14); playTone(180, 0.16, 'triangle', 0.16, 0.02); }
function sndIllegal()  { playTone(140, 0.12, 'sawtooth', 0.10); }
function sndCorrect()  { playTone(620, 0.1, 'sine', 0.2); playTone(880, 0.14, 'sine', 0.18, 0.09); }
function sndWrong()    { playTone(200, 0.22, 'sawtooth', 0.16); }
let D = {};

// ── HEADER CONTROLS ──
const openingSel   = document.getElementById('openingSelect');
const variationSel = document.getElementById('variationSelect');
const learnBtn     = document.getElementById('learnBtn');
const testBtn      = document.getElementById('testBtn');
const mainArea     = document.getElementById('mainArea');

openingSel.addEventListener('change', () => {
  const key = openingSel.value;
  variationSel.innerHTML = '<option value="">— Variation —</option>';
  variationSel.disabled = true;
  learnBtn.disabled = testBtn.disabled = true;
  if (!key) { showWelcome(); return; }
  const op = OPENINGS[key];
  Object.entries(op.variations).forEach(([vk,v]) => {
    const o = document.createElement('option');
    o.value = vk; o.textContent = v.name;
    variationSel.appendChild(o);
  });
  variationSel.disabled = false;
  const varKeys = Object.keys(op.variations);
  if (varKeys.length === 1) { variationSel.value = varKeys[0]; variationSel.dispatchEvent(new Event('change')); }
});

variationSel.addEventListener('change', () => {
  if (!variationSel.value) return;
  learnBtn.disabled = testBtn.disabled = false;
  loadOpening(openingSel.value, variationSel.value, 'learn');
});

learnBtn.addEventListener('click', () => { if (openingSel.value && variationSel.value) loadOpening(openingSel.value, variationSel.value, 'learn'); });
testBtn.addEventListener('click',  () => { if (openingSel.value && variationSel.value) loadOpening(openingSel.value, variationSel.value, 'test'); });
document.getElementById('playBotBtn').addEventListener('click', () => { if (S.autoTimer) clearTimeout(S.autoTimer); loadBotMode(); });

function showWelcome() {
  mainArea.innerHTML = '<div id="welcome"><h1>OpeningForge</h1><p>Master your chess openings — move by move, with explanations for every idea.</p><p class="hint">↑ Select an opening above to begin</p></div>';
}

// ── LOAD OPENING ──
function loadOpening(opKey, varKey, mode) {
  if (S.autoTimer) clearTimeout(S.autoTimer);
  const op = OPENINGS[opKey]; const vr = op.variations[varKey];
  S.opening = op; S.variation = vr; S.moves = vr.moves;
  S.mode = mode; S.chess = new Chess(); S.currentMove = -1;
  S.flipped = op.color === 'black';
  S.busy = false;

  mainArea.innerHTML = '';
  const tpl = document.getElementById('appTpl');
  mainArea.appendChild(tpl.content.cloneNode(true));
  initDom();

  document.getElementById('openingTitle').textContent = op.name;
  document.getElementById('openingSubtitle').textContent = vr.name;
  document.getElementById('openingIntroText').textContent = vr.intro;

  buildMoveFeed();
  buildCoords();

  if (mode === 'learn') startLearnMode();
  else startTestMode();
}

function initDom() {
  D = {};
  ['modeBadge','progressBar','moveFeed','btnFirst','btnPrev','btnNext','btnLast',
   'learnContent','testContent','testScore','scoreCorrect','scoreWrong',
   'testInstruction','testMoveStatus','testResult','resultScore','resultMsg',
   'retryBtn','feedbackBar','autoLabel','rankLabels','fileLabels','btnFlip','btnMute'].forEach(id => {
    D[id] = document.getElementById(id);
  });
  D.btnFirst.addEventListener('click', () => goTo(-1));
  D.btnPrev.addEventListener('click',  () => goTo(S.currentMove - 1));
  D.btnNext.addEventListener('click',  () => goTo(S.currentMove + 1));
  D.btnLast.addEventListener('click',  () => goTo(S.moves.length - 1));
  D.retryBtn.addEventListener('click', startTestMode);
  D.btnFlip.addEventListener('click', () => {
    S.flipped = !S.flipped;
    buildCoords();
    renderBoard(S.mode === 'test');
  });
  D.btnMute.addEventListener('click', () => {
    S.muted = !S.muted;
    D.btnMute.textContent = S.muted ? '🔇' : '🔊';
  });
  D.btnMute.textContent = S.muted ? '🔇' : '🔊';
}

function buildCoords() {
  const files = S.flipped ? ['h','g','f','e','d','c','b','a'] : ['a','b','c','d','e','f','g','h'];
  const ranks = S.flipped ? [1,2,3,4,5,6,7,8] : [8,7,6,5,4,3,2,1];
  D.rankLabels.innerHTML = ranks.map(r => `<div class="coord-label">${r}</div>`).join('');
  D.fileLabels.innerHTML = files.map(f => `<div class="coord-label">${f}</div>`).join('');
}

// ── MOVE FEED ──
function buildMoveFeed() {
  D.moveFeed.innerHTML = '';
  const playerColor = S.opening.color; // 'white' or 'black'
  S.moves.forEach((mv, i) => {
    const isWhiteMv = mv.who === 'white';
    const isYourMove = mv.who === playerColor;
    const entry = document.createElement('div');
    entry.className = 'move-entry' + (isYourMove ? ' your-move' : '');
    entry.id = 'me-' + i;
    entry.innerHTML = `
      <div class="move-number">${isWhiteMv ? Math.floor(i/2)+1+'.' : ''}</div>
      <div class="move-info">
        <div class="move-san">${mv.san}<span class="who-badge ${isWhiteMv?'w':'b'}">${isWhiteMv?'White':'Black'}</span></div>
        <div class="move-explanation">${mv.explanation}</div>
      </div>`;
    D.moveFeed.appendChild(entry);
  });
}

// ── LEARN MODE ──
function startLearnMode() {
  S.mode = 'learn';
  D.modeBadge.className = 'mode-badge learn'; D.modeBadge.textContent = 'LEARN MODE';
  D.learnContent.style.display = 'flex'; D.learnContent.style.flexDirection = 'column'; D.learnContent.style.flex = '1'; D.learnContent.style.overflow = 'hidden';
  D.testContent.classList.remove('active');
  D.testScore.style.display = 'none';
  [D.btnFirst,D.btnPrev,D.btnNext,D.btnLast].forEach(b => b.disabled = false);
  goTo(-1);
}

function goTo(idx) {
  if (S.mode !== 'learn') return;
  if (S.autoTimer) clearTimeout(S.autoTimer);
  const prevIdx = S.currentMove;
  idx = Math.max(-1, Math.min(S.moves.length - 1, idx));
  if (idx === prevIdx + 1 && idx >= 0) {
    const mv = S.moves[idx];
    if (mv.san.includes('x')) sndCapture(); else sndMove();
  }
  S.currentMove = idx;
  S.chess = new Chess();
  for (let i = 0; i <= idx; i++) S.chess.move(S.moves[i].san);
  renderBoard(false);
  updateMoveFeed();
  updateProgress(idx + 1, S.moves.length);
  D.btnFirst.disabled = D.btnPrev.disabled = idx <= -1;
  D.btnNext.disabled = D.btnLast.disabled = idx >= S.moves.length - 1;
  D.autoLabel.textContent = '';
}

function updateMoveFeed() {
  document.querySelectorAll('.move-entry').forEach((el,i) => {
    el.classList.remove('active','visited');
    if (i === S.currentMove) el.classList.add('active');
    else if (i < S.currentMove) el.classList.add('visited');
  });
  const active = document.getElementById('me-' + S.currentMove);
  if (active) active.scrollIntoView({block:'nearest',behavior:'smooth'});
}

function updateProgress(done, total) {
  D.progressBar.style.width = (total === 0 ? 0 : (done / total) * 100) + '%';
}

// ── TEST MODE ──
function startTestMode() {
  if (S.autoTimer) clearTimeout(S.autoTimer);
  S.mode = 'test'; S.testMove = 0;
  S.testCorrect = 0; S.testWrong = 0;
  S.selectedSq = null; S.legalMoves = [];
  S.testChess = new Chess(); S.busy = false;

  D.modeBadge.className = 'mode-badge test'; D.modeBadge.textContent = 'TEST MODE';
  D.learnContent.style.display = 'none';
  D.testContent.classList.add('active');
  D.testScore.style.display = 'flex';
  D.testResult.classList.remove('show');
  D.testMoveStatus.textContent = ''; D.testMoveStatus.className = 'test-move-status';
  D.scoreCorrect.textContent = '0'; D.scoreWrong.textContent = '0';
  [D.btnFirst,D.btnPrev,D.btnNext,D.btnLast].forEach(b => b.disabled = true);
  updateProgress(0, S.moves.length);

  renderBoard(true);
  maybeAutoMove();
}

// If the current test move is the opponent's color, play it automatically
function maybeAutoMove() {
  if (S.testMove >= S.moves.length) return;
  const mv = S.moves[S.testMove];
  const playerColor = S.opening.color;
  if (mv.who !== playerColor) {
    // Opponent's move — auto-play after delay
    S.busy = true;
    D.autoLabel.textContent = mv.who === 'white' ? 'White is thinking…' : 'Black is thinking…';
    S.autoTimer = setTimeout(() => {
      S.testChess.move(mv.san);
      S.testMove++;
      updateProgress(S.testMove, S.moves.length);
      D.autoLabel.textContent = '';
      S.busy = false;
      renderBoard(true);
      if (S.testMove >= S.moves.length) { finishTest(); return; }
      maybeAutoMove(); // in case two opponent moves in a row (shouldn't happen but safe)
      updateTestInstruction();
    }, 650);
  } else {
    updateTestInstruction();
  }
}

function updateTestInstruction() {
  if (S.testMove >= S.moves.length) return;
  const mv = S.moves[S.testMove];
  D.testInstruction.textContent = `Move ${S.testMove + 1} of ${S.moves.length} — play ${mv.who === 'white' ? 'White' : 'Black'}'s move`;
}

function handleTestClick(sq) {
  if (S.suppressClick) return;
  if (S.mode !== 'test' || S.busy || S.testMove >= S.moves.length) return;
  const expectedMv = S.moves[S.testMove];
  const playerColor = S.opening.color;
  if (expectedMv.who !== playerColor) return; // not your turn

  const toMove = S.testChess.turn();
  const piece = S.testChess.get(sq);

  if (!S.selectedSq) {
    if (piece && piece.color === toMove) {
      S.selectedSq = sq;
      S.legalMoves = S.testChess.moves({square:sq, verbose:true});
      renderBoard(true);
    }
    return;
  }

  const from = S.selectedSq;
  if (from === sq) { S.selectedSq = null; S.legalMoves = []; renderBoard(true); return; }
  S.selectedSq = null; S.legalMoves = [];
  attemptTestMove(from, sq, toMove, piece);
}

// Shared by click-to-move and drag-and-drop
function attemptTestMove(from, sq, toMoveColor, pieceAtFrom) {
  const expectedMv = S.moves[S.testMove];
  const toMove = toMoveColor !== undefined ? toMoveColor : S.testChess.turn();
  const piece = pieceAtFrom !== undefined ? pieceAtFrom : S.testChess.get(from);
  const result = S.testChess.move({from, to:sq, promotion:'q'});

  if (result) {
    const correct = result.san === expectedMv.san;
    if (!correct) { S.testChess.undo(); S.testChess.move(expectedMv.san); }

    if (correct) {
      S.testCorrect++; D.scoreCorrect.textContent = S.testCorrect;
      if (result.captured) sndCapture(); else sndMove();
      flashSquares(from, sq, true);
      showFeedback('✔ Correct!', true);
      D.testMoveStatus.textContent = '✔ ' + result.san;
      D.testMoveStatus.className = 'test-move-status correct';
    } else {
      S.testWrong++; D.scoreWrong.textContent = S.testWrong;
      sndWrong();
      flashSquares(from, sq, false);
      showFeedback('✘ Expected: ' + expectedMv.san, false);
      D.testMoveStatus.textContent = '✘ Expected: ' + expectedMv.san;
      D.testMoveStatus.className = 'test-move-status wrong';
    }

    S.testMove++;
    updateProgress(S.testMove, S.moves.length);
    renderBoard(true);

    S.busy = true;
    S.autoTimer = setTimeout(() => {
      S.busy = false;
      D.testMoveStatus.textContent = '';
      renderBoard(true);
      if (S.testMove >= S.moves.length) { finishTest(); return; }
      maybeAutoMove();
    }, 900);
    return true;

  } else {
    sndIllegal();
    if (piece && piece.color === toMove) {
      S.selectedSq = from;
      S.legalMoves = S.testChess.moves({square:from, verbose:true});
    }
    renderBoard(true);
    return false;
  }
}

function flashSquares(from, to, good) {
  const cls = good ? 'correct' : 'wrong';
  [from, to].forEach(sq => {
    const el = document.querySelector(`[data-sq="${sq}"]`);
    if (el) { el.classList.add(cls); setTimeout(() => el.classList.remove(cls), 900); }
  });
}

function showFeedback(msg, good) {
  const bar = D.feedbackBar;
  bar.textContent = msg; bar.className = 'feedback-bar show ' + (good ? 'good' : 'bad');
  setTimeout(() => bar.className = 'feedback-bar', 1300);
}

function finishTest() {
  const total = S.moves.length, correct = S.testCorrect;
  const pct = Math.round(correct / total * 100);
  D.resultScore.textContent = correct + '/' + total;
  D.resultMsg.textContent = pct === 100 ? "Perfect! You've mastered this line." : pct >= 70 ? "Good work! Review the moves you missed, then try again." : "Keep practising — openings take repetition. You'll get there!";
  D.testResult.classList.add('show');
  D.testMoveStatus.textContent = '';
}

// ── BOARD RENDER ──
function renderBoard(isTest) {
  const chess = isTest ? S.testChess : S.chess;
  const board = document.getElementById('chessboard');
  if (!board) return;
  board.innerHTML = '';

  const files = ['a','b','c','d','e','f','g','h'];
  const ranks = [8,7,6,5,4,3,2,1];
  const dFiles = S.flipped ? [...files].reverse() : files;
  const dRanks = S.flipped ? [...ranks].reverse() : ranks;

  const history = chess.history({verbose:true});
  const lastMv = history[history.length - 1];

  const playerColor = S.opening ? S.opening.color : 'white';
  const expectedMv = (isTest && S.testMove < S.moves.length) ? S.moves[S.testMove] : null;
  const isYourTurn = isTest && expectedMv && expectedMv.who === playerColor && !S.busy;

  dRanks.forEach(rank => {
    dFiles.forEach(file => {
      const sq = file + rank;
      const piece = chess.get(sq);
      const fi = files.indexOf(file), ri = rank;
      const isLight = (fi + ri) % 2 === 1;

      const cell = document.createElement('div');
      cell.className = 'sq ' + (isLight ? 'light' : 'dark');
      cell.dataset.sq = sq;

      // last move highlight
      if (lastMv && (sq === lastMv.from || sq === lastMv.to)) cell.classList.add(sq === lastMv.from ? 'hl-from' : 'hl-to');

      // test mode interactivity
      if (isTest && isYourTurn) {
        cell.dataset.clickable = '1';
        cell.addEventListener('click', () => handleTestClick(sq));
        if (sq === S.selectedSq) cell.classList.add('selected');
        const lm = S.legalMoves.find(m => m.to === sq);
        if (lm) cell.classList.add(lm.captured ? 'legal-capture' : 'legal-dot');
      }

      // piece image
      if (piece) {
        const img = document.createElement('img');
        img.className = 'piece-img';
        img.src = PIECE_IMGS[piece.color + piece.type.toUpperCase()];
        img.alt = piece.color + piece.type;
        if (isTest && isYourTurn && piece.color === toMove) {
          img.classList.add('draggable');
          img.addEventListener('pointerdown', (e) => startDrag(e, sq, img));
        }
        cell.appendChild(img);
      }

      board.appendChild(cell);
    });
  });
}

// ── DRAG AND DROP ──
function startDrag(e, sq, imgEl) {
  if (S.mode !== 'test' || S.busy) return;
  e.preventDefault();
  const board = document.getElementById('chessboard');
  const toMove = S.testChess.turn();

  S.selectedSq = sq;
  S.legalMoves = S.testChess.moves({square:sq, verbose:true});
  document.querySelectorAll('.sq').forEach(el => {
    el.classList.remove('selected','legal-dot','legal-capture');
    if (el.dataset.sq === sq) el.classList.add('selected');
    const lm = S.legalMoves.find(m => m.to === el.dataset.sq);
    if (lm) el.classList.add(lm.captured ? 'legal-capture' : 'legal-dot');
  });

  imgEl.classList.add('dragging-source');
  const ghost = document.createElement('img');
  ghost.className = 'drag-ghost';
  ghost.src = imgEl.src;
  document.body.appendChild(ghost);
  const move = (ev) => { ghost.style.left = ev.clientX + 'px'; ghost.style.top = ev.clientY + 'px'; };
  move(e);

  let lastOverEl = null;
  const onMove = (ev) => {
    move(ev);
    const el = document.elementFromPoint(ev.clientX, ev.clientY);
    const cell = el && el.closest ? el.closest('.sq') : null;
    if (lastOverEl && lastOverEl !== cell) lastOverEl.classList.remove('drag-over');
    if (cell) cell.classList.add('drag-over');
    lastOverEl = cell;
  };
  const onUp = (ev) => {
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onUp);
    ghost.remove();
    if (lastOverEl) lastOverEl.classList.remove('drag-over');
    imgEl.classList.remove('dragging-source');

    const el = document.elementFromPoint(ev.clientX, ev.clientY);
    const cell = el && el.closest ? el.closest('.sq') : null;
    const dropSq = cell ? cell.dataset.sq : null;

    S.selectedSq = null; S.legalMoves = [];
    document.querySelectorAll('.sq').forEach(el2 => el2.classList.remove('selected','legal-dot','legal-capture'));

    if (dropSq && dropSq !== sq) {
      attemptTestMove(sq, dropSq, toMove, S.testChess.get(sq));
    } else {
      renderBoard(true);
    }
    S.suppressClick = true;
    setTimeout(() => { S.suppressClick = false; }, 50);
  };
  document.addEventListener('pointermove', onMove);
  document.addEventListener('pointerup', onUp);
}

// ══════════════════════════════════════════════════════════════
// PLAY VS BOT MODE — fully self-contained, does not touch OPENINGS,
// the Learn/Test state (S), or any of the opening-trainer logic above.
// ══════════════════════════════════════════════════════════════
const BOT_LEVELS = [
  {skill:0,  elo:'400–600 ELO',    label:'Absolute Beginner', blunder:0.65, time:150},
  {skill:0,  elo:'800–1000 ELO',   label:'Beginner',          blunder:0.22, time:250},
  {skill:2,  elo:'1000–1100 ELO',  label:'Casual Player',     blunder:0.10, time:300},
  {skill:4,  elo:'1100–1300 ELO',  label:'Club Novice',       blunder:0.04, time:350},
  {skill:6,  elo:'1300–1500 ELO',  label:'Club Player',       blunder:0,    time:450},
  {skill:9,  elo:'1500–1700 ELO',  label:'Strong Club Player',blunder:0,    time:550},
  {skill:12, elo:'1700–1900 ELO',  label:'Expert',            blunder:0,    time:750},
  {skill:15, elo:'1900–2100 ELO',  label:'Master',            blunder:0,    time:1000},
  {skill:18, elo:'2100–2400 ELO',  label:'International Master', blunder:0, time:1300},
  {skill:20, elo:'2800+ ELO',      label:'Grandmaster (full strength)', blunder:0, time:1800}
];

let Bot = {
  chess:null, worker:null, workerReady:false, workerError:false,
  level:4, playerColor:'white', flipped:false, gameOver:false, thinking:false,
  selectedSq:null, legalMoves:[], moveList:[], started:false
};
let BD = {};

function loadBotMode() {
  mainArea.innerHTML = '';
  const tpl = document.getElementById('botTpl');
  mainArea.appendChild(tpl.content.cloneNode(true));
  initBotDom();

  Bot.chess = new Chess(); Bot.gameOver = false; Bot.thinking = false;
  Bot.selectedSq = null; Bot.legalMoves = []; Bot.moveList = []; Bot.started = false;
  Bot.flipped = Bot.playerColor === 'black';

  BOT_LEVELS.forEach((lv, i) => {
    const o = document.createElement('option');
    o.value = i;
    o.textContent = `${i+1} — ${lv.label} (${lv.elo})`;
    BD.botLevelSelect.appendChild(o);
  });
  BD.botLevelSelect.value = Bot.level;
  BD.botColorSelect.value = Bot.playerColor;

  buildBotCoords();
  renderBotBoard();
  BD.botStatusText.textContent = 'Pick a difficulty and a color, then start the game.';
  BD.botResignBtn.style.display = 'none';
  BD.botStartBtn.textContent = 'Start Game';
}

function initBotDom() {
  BD = {};
  ['rankLabels','fileLabels','feedbackBar','autoLabel','btnFlip','btnMute',
   'botTitle','botStatusText','botLevelSelect','botColorSelect','botStartBtn','botResignBtn','botMoveFeed'].forEach(id => {
    BD[id] = document.getElementById(id);
  });
  BD.btnFlip.addEventListener('click', () => { Bot.flipped = !Bot.flipped; buildBotCoords(); renderBotBoard(); });
  BD.btnMute.addEventListener('click', () => {
    S.muted = !S.muted;
    BD.btnMute.textContent = S.muted ? '🔇' : '🔊';
  });
  BD.btnMute.textContent = S.muted ? '🔇' : '🔊';
  BD.botLevelSelect.addEventListener('change', () => { Bot.level = parseInt(BD.botLevelSelect.value,10); });
  BD.botColorSelect.addEventListener('change', () => { Bot.playerColor = BD.botColorSelect.value; });
  BD.botStartBtn.addEventListener('click', startBotGame);
  BD.botResignBtn.addEventListener('click', resignBotGame);
}

function resignBotGame() {
  if (!Bot.started || Bot.gameOver) return;
  Bot.gameOver = true;
  Bot.thinking = false;
  BD.autoLabel.textContent = '';
  const opponent = Bot.playerColor === 'white' ? 'Black (the bot)' : 'White (the bot)';
  BD.botStatusText.textContent = `You resigned. ${opponent} wins.`;
  BD.botResignBtn.style.display = 'none';
  renderBotBoard();
}

function buildBotCoords() {
  const files = Bot.flipped ? ['h','g','f','e','d','c','b','a'] : ['a','b','c','d','e','f','g','h'];
  const ranks = Bot.flipped ? [1,2,3,4,5,6,7,8] : [8,7,6,5,4,3,2,1];
  BD.rankLabels.innerHTML = ranks.map(r => `<div class="coord-label">${r}</div>`).join('');
  BD.fileLabels.innerHTML = files.map(f => `<div class="coord-label">${f}</div>`).join('');
}

// ── ENGINE (Stockfish loaded as a plain script, not a Worker — avoids
// cross-origin Worker/blob restrictions some sandboxes enforce) ──
const STOCKFISH_CDN_URLS = [
  'https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js',
  'https://unpkg.com/stockfish.js@10.0.2/stockfish.js'
];

function loadScriptTag(url) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = url;
    s.onload = () => resolve();
    s.onerror = () => reject(new Error('failed to load ' + url));
    document.head.appendChild(s);
  });
}

function ensureWorker() {
  return new Promise((resolve, reject) => {
    if (Bot.workerReady) { resolve(); return; }
    if (Bot.workerError) { reject(new Error(Bot.workerErrorMsg || 'engine unavailable')); return; }

    (async () => {
      let loaded = false;
      for (const url of STOCKFISH_CDN_URLS) {
        try { await loadScriptTag(url); if (typeof window.STOCKFISH === 'function') { loaded = true; break; } }
        catch (err) { /* try next */ }
      }
      if (!loaded) {
        Bot.workerError = true;
        Bot.workerErrorMsg = 'Could not load the chess engine (network blocked or unsupported browser).';
        reject(new Error(Bot.workerErrorMsg));
        return;
      }
      try {
        const engine = window.STOCKFISH();
        Bot.worker = engine;
        let settled = false;
        const timeout = setTimeout(() => {
          if (!settled) {
            settled = true; Bot.workerError = true;
            Bot.workerErrorMsg = 'Engine did not respond in time.';
            reject(new Error(Bot.workerErrorMsg));
          }
        }, 15000);
        const handleLine = (line) => {
          if (typeof line !== 'string') return;
          if (line === 'uciok') { engine.postMessage('isready'); }
          if (line === 'readyok' && !settled) {
            settled = true; clearTimeout(timeout);
            Bot.workerReady = true;
            resolve();
          }
        };
        engine.onmessage = (e) => handleLine(typeof e === 'string' ? e : (e && e.data));
        if (typeof engine.addMessageListener === 'function') engine.addMessageListener(handleLine);
        engine.postMessage('uci');
      } catch (err) {
        Bot.workerError = true;
        Bot.workerErrorMsg = 'Could not start the chess engine.';
        reject(err);
      }
    })();
  });
}

function getEngineMove(fen, level) {
  const lv = BOT_LEVELS[level];
  return new Promise((resolve, reject) => {
    ensureWorker().then(() => {
      const engine = Bot.worker;
      let resolved = false;
      const handleLine = (line) => {
        if (resolved || typeof line !== 'string') return;
        if (line.startsWith('bestmove')) {
          resolved = true;
          resolve(line.split(' ')[1]);
        }
      };
      engine.onmessage = (e) => handleLine(typeof e === 'string' ? e : (e && e.data));
      if (typeof engine.addMessageListener === 'function') engine.addMessageListener(handleLine);
      engine.postMessage('setoption name Skill Level value ' + lv.skill);
      engine.postMessage('position fen ' + fen);
      engine.postMessage('go movetime ' + lv.time);
    }).catch(reject);
  });
}

function uciToMove(uci, chess) {
  const from = uci.slice(0,2), to = uci.slice(2,4);
  const promo = uci.length > 4 ? uci[4] : 'q';
  return chess.move({from, to, promotion: promo});
}

// ── GAME FLOW ──
function startBotGame() {
  Bot.chess = new Chess(); Bot.gameOver = false; Bot.thinking = false;
  Bot.selectedSq = null; Bot.legalMoves = []; Bot.moveList = []; Bot.started = true;
  Bot.flipped = Bot.playerColor === 'black';
  buildBotCoords();
  BD.botMoveFeed.innerHTML = '';
  BD.botTitle.textContent = `Level ${Bot.level+1} — ${BOT_LEVELS[Bot.level].label}`;
  BD.botStatusText.textContent = `Playing as ${Bot.playerColor === 'white' ? 'White' : 'Black'}.`;
  BD.autoLabel.textContent = '';
  BD.botResignBtn.style.display = 'block';
  BD.botStartBtn.textContent = 'Restart Game';
  renderBotBoard();
  if (Bot.playerColor === 'black') triggerBotMove();
}

function botGameOverCheck() {
  if (Bot.chess.in_checkmate()) {
    const winner = Bot.chess.turn() === 'w' ? 'Black' : 'White';
    Bot.gameOver = true;
    BD.botStatusText.textContent = `Checkmate — ${winner} wins.`;
    BD.botResignBtn.style.display = 'none';
    return true;
  }
  if (Bot.chess.in_stalemate()) { Bot.gameOver = true; BD.botStatusText.textContent = 'Draw by stalemate.'; BD.botResignBtn.style.display = 'none'; return true; }
  if (Bot.chess.in_draw())      { Bot.gameOver = true; BD.botStatusText.textContent = 'Draw.'; BD.botResignBtn.style.display = 'none'; return true; }
  return false;
}

function addBotMoveToFeed(san, color) {
  Bot.moveList.push({san, color});
  const i = Bot.moveList.length - 1;
  const entry = document.createElement('div');
  entry.className = 'move-entry active';
  entry.innerHTML = `<div class="move-number">${color==='w'?Math.floor(i/2)+1+'.':''}</div>
    <div class="move-info"><div class="move-san">${san}<span class="who-badge ${color==='w'?'w':'b'}">${color==='w'?'White':'Black'}</span></div></div>`;
  document.querySelectorAll('#botMoveFeed .move-entry').forEach(el => el.classList.remove('active'));
  BD.botMoveFeed.appendChild(entry);
  entry.scrollIntoView({block:'nearest', behavior:'smooth'});
}

function triggerBotMove() {
  if (Bot.gameOver) return;
  Bot.thinking = true;
  BD.autoLabel.textContent = 'Bot is thinking…';
  renderBotBoard();
  const fen = Bot.chess.fen();
  const lv = BOT_LEVELS[Bot.level];

  getEngineMove(fen, Bot.level).then(uci => {
    let result;
    if (lv.blunder > 0 && Math.random() < lv.blunder) {
      const legal = Bot.chess.moves({verbose:true});
      const pick = legal[Math.floor(Math.random() * legal.length)];
      result = Bot.chess.move({from:pick.from, to:pick.to, promotion:'q'});
    } else {
      result = uciToMove(uci, Bot.chess);
      if (!result) { // fallback if engine returns something unparseable
        const legal = Bot.chess.moves({verbose:true});
        const pick = legal[Math.floor(Math.random() * legal.length)];
        result = Bot.chess.move({from:pick.from, to:pick.to, promotion:'q'});
      }
    }
    if (result.captured) sndCapture(); else sndMove();
    addBotMoveToFeed(result.san, result.color);
    Bot.thinking = false;
    BD.autoLabel.textContent = '';
    renderBotBoard();
    if (!botGameOverCheck()) {
      BD.botStatusText.textContent = 'Your move.';
    }
  }).catch((err) => {
    Bot.thinking = false;
    BD.autoLabel.textContent = '';
    BD.botStatusText.textContent = (err && err.message) ? err.message : "Couldn't reach the chess engine — check your network settings and try again.";
    renderBotBoard();
  });
}

function attemptBotMove(from, to) {
  const piece = Bot.chess.get(from);
  const result = Bot.chess.move({from, to, promotion:'q'});
  if (!result) { sndIllegal(); return false; }
  if (result.captured) sndCapture(); else sndMove();
  addBotMoveToFeed(result.san, result.color);
  renderBotBoard();
  if (botGameOverCheck()) return true;
  BD.botStatusText.textContent = '';
  triggerBotMove();
  return true;
}

function handleBotClick(sq) {
  if (!Bot.started || Bot.gameOver || Bot.thinking) return;
  const playerTurn = Bot.playerColor === 'white' ? 'w' : 'b';
  if (Bot.chess.turn() !== playerTurn) return;

  const piece = Bot.chess.get(sq);
  if (!Bot.selectedSq) {
    if (piece && piece.color === playerTurn) {
      Bot.selectedSq = sq;
      Bot.legalMoves = Bot.chess.moves({square:sq, verbose:true});
      renderBotBoard();
    }
    return;
  }
  const from = Bot.selectedSq;
  if (from === sq) { Bot.selectedSq = null; Bot.legalMoves = []; renderBotBoard(); return; }
  Bot.selectedSq = null; Bot.legalMoves = [];
  const moved = attemptBotMove(from, sq);
  if (!moved) {
    if (piece && piece.color === playerTurn) {
      Bot.selectedSq = sq;
      Bot.legalMoves = Bot.chess.moves({square:sq, verbose:true});
    }
    renderBotBoard();
  }
}

function startBotDrag(e, sq, imgEl) {
  if (!Bot.started || Bot.gameOver || Bot.thinking) return;
  const playerTurn = Bot.playerColor === 'white' ? 'w' : 'b';
  if (Bot.chess.turn() !== playerTurn) return;
  e.preventDefault();

  Bot.selectedSq = sq;
  Bot.legalMoves = Bot.chess.moves({square:sq, verbose:true});
  document.querySelectorAll('.sq').forEach(el => {
    el.classList.remove('selected','legal-dot','legal-capture');
    if (el.dataset.sq === sq) el.classList.add('selected');
    const lm = Bot.legalMoves.find(m => m.to === el.dataset.sq);
    if (lm) el.classList.add(lm.captured ? 'legal-capture' : 'legal-dot');
  });

  imgEl.classList.add('dragging-source');
  const ghost = document.createElement('img');
  ghost.className = 'drag-ghost';
  ghost.src = imgEl.src;
  document.body.appendChild(ghost);
  const move = (ev) => { ghost.style.left = ev.clientX + 'px'; ghost.style.top = ev.clientY + 'px'; };
  move(e);

  let lastOverEl = null;
  const onMove = (ev) => {
    move(ev);
    const el = document.elementFromPoint(ev.clientX, ev.clientY);
    const cell = el && el.closest ? el.closest('.sq') : null;
    if (lastOverEl && lastOverEl !== cell) lastOverEl.classList.remove('drag-over');
    if (cell) cell.classList.add('drag-over');
    lastOverEl = cell;
  };
  const onUp = (ev) => {
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onUp);
    ghost.remove();
    if (lastOverEl) lastOverEl.classList.remove('drag-over');
    imgEl.classList.remove('dragging-source');

    const el = document.elementFromPoint(ev.clientX, ev.clientY);
    const cell = el && el.closest ? el.closest('.sq') : null;
    const dropSq = cell ? cell.dataset.sq : null;

    Bot.selectedSq = null; Bot.legalMoves = [];
    document.querySelectorAll('.sq').forEach(el2 => el2.classList.remove('selected','legal-dot','legal-capture'));

    if (dropSq && dropSq !== sq) attemptBotMove(sq, dropSq);
    else renderBotBoard();
    S.suppressClick = true;
    setTimeout(() => { S.suppressClick = false; }, 50);
  };
  document.addEventListener('pointermove', onMove);
  document.addEventListener('pointerup', onUp);
}

function renderBotBoard() {
  const chess = Bot.chess;
  const board = document.getElementById('chessboard');
  if (!board || !chess) return;
  board.innerHTML = '';

  const files = ['a','b','c','d','e','f','g','h'];
  const ranks = [8,7,6,5,4,3,2,1];
  const dFiles = Bot.flipped ? [...files].reverse() : files;
  const dRanks = Bot.flipped ? [...ranks].reverse() : ranks;

  const history = chess.history({verbose:true});
  const lastMv = history[history.length - 1];
  const playerTurn = Bot.playerColor === 'white' ? 'w' : 'b';
  const isYourTurn = Bot.started && !Bot.gameOver && !Bot.thinking && chess.turn() === playerTurn;

  dRanks.forEach(rank => {
    dFiles.forEach(file => {
      const sq = file + rank;
      const piece = chess.get(sq);
      const fi = files.indexOf(file), ri = rank;
      const isLight = (fi + ri) % 2 === 1;

      const cell = document.createElement('div');
      cell.className = 'sq ' + (isLight ? 'light' : 'dark');
      cell.dataset.sq = sq;

      if (lastMv && (sq === lastMv.from || sq === lastMv.to)) cell.classList.add(sq === lastMv.from ? 'hl-from' : 'hl-to');

      if (isYourTurn) {
        cell.dataset.clickable = '1';
        cell.addEventListener('click', () => { if (!S.suppressClick) handleBotClick(sq); });
        if (sq === Bot.selectedSq) cell.classList.add('selected');
        const lm = Bot.legalMoves.find(m => m.to === sq);
        if (lm) cell.classList.add(lm.captured ? 'legal-capture' : 'legal-dot');
      }

      if (piece) {
        const img = document.createElement('img');
        img.className = 'piece-img';
        img.src = PIECE_IMGS[piece.color + piece.type.toUpperCase()];
        img.alt = piece.color + piece.type;
        if (isYourTurn && piece.color === playerTurn) {
          img.classList.add('draggable');
          img.addEventListener('pointerdown', (e) => startBotDrag(e, sq, img));
        }
        cell.appendChild(img);
      }

      board.appendChild(cell);
    });
  });
}

// ── KEYBOARD NAV ──
document.addEventListener('keydown', e => {
  if (S.mode !== 'learn') return;
  if (e.key === 'ArrowRight') goTo(S.currentMove + 1);
  if (e.key === 'ArrowLeft')  goTo(S.currentMove - 1);
  if (e.key === 'Home')       goTo(-1);
  if (e.key === 'End')        goTo(S.moves.length - 1);
});
